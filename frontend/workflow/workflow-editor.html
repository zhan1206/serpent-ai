<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SerpentAI 工作流编辑器</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f0f1e; color: #e0e0e0; height: 100vh; overflow: hidden; }
        
        /* 布局 */
        .app { display: flex; flex-direction: column; height: 100vh; }
        .header { background: #1a1a2e; padding: 12px 20px; border-bottom: 1px solid #2a2a4a; display: flex; align-items: center; gap: 16px; }
        .header h1 { font-size: 18px; color: #00d4ff; }
        .header .logo { font-size: 24px; margin-right: 8px; }
        
        .toolbar { display: flex; gap: 8px; }
        .toolbar button { background: #2a2a4a; border: 1px solid #3a3a5a; color: #e0e0e0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .toolbar button:hover { background: #3a3a5a; border-color: #00d4ff; }
        .toolbar button.primary { background: #00d4ff; color: #0a0a1e; border-color: #00d4ff; font-weight: 600; }
        .toolbar button.primary:hover { background: #00b8e6; }
        .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .main { display: flex; flex: 1; overflow: hidden; }
        
        /* 左侧面板 - 节点类型 */
        .sidebar { width: 220px; background: #1a1a2e; border-right: 1px solid #2a2a4a; padding: 16px; overflow-y: auto; }
        .sidebar h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 12px; letter-spacing: 1px; }
        .node-palette { display: flex; flex-direction: column; gap: 6px; }
        .palette-item { background: #252540; border: 1px solid #3a3a5a; border-radius: 6px; padding: 10px 12px; cursor: grab; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: all 0.2s; user-select: none; }
        .palette-item:hover { background: #2a2a5a; border-color: #00d4ff; transform: translateX(2px); }
        .palette-item .icon { font-size: 16px; }
        .palette-item .type { color: #888; font-size: 11px; margin-left: auto; }
        
        /* 中间 - 画布 */
        .canvas-container { flex: 1; position: relative; overflow: hidden; background: #0f0f1e; }
        .canvas { width: 100%; height: 100%; position: relative; overflow: auto; }
        .canvas-bg { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: radial-gradient(circle, #2a2a4a 1px, transparent 1px); background-size: 20px 20px; min-width: 3000px; min-height: 2000px; }
        
        /* 节点 */
        .workflow-node { position: absolute; background: #1e1e3a; border: 2px solid #3a3a6a; border-radius: 10px; padding: 0; min-width: 140px; cursor: move; transition: border-color 0.2s, box-shadow 0.2s; font-size: 12px; }
        .workflow-node:hover { border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .workflow-node.selected { border-color: #ff6b6b; box-shadow: 0 0 20px rgba(255, 107, 107, 0.4); }
        .workflow-node.running { border-color: #ffd93d; animation: pulse 1s infinite; }
        .workflow-node.completed { border-color: #6bcb77; }
        .workflow-node.failed { border-color: #ff4757; }
        
        @keyframes pulse { 0%, 100% { box-shadow: 0 0 5px rgba(255, 217, 61, 0.5); } 50% { box-shadow: 0 0 20px rgba(255, 217, 61, 0.8); } }
        
        .node-header { background: #2a2a5a; padding: 8px 12px; border-radius: 8px 8px 0 0; display: flex; align-items: center; gap: 8px; }
        .node-icon { font-size: 16px; }
        .node-title { flex: 1; font-weight: 600; color: #fff; font-size: 13px; }
        .node-type { font-size: 10px; color: #888; background: #1a1a3a; padding: 2px 6px; border-radius: 3px; }
        
        .node-body { padding: 10px 12px; }
        .node-config { font-size: 11px; color: #aaa; }
        .node-status { margin-top: 6px; font-size: 10px; padding: 3px 8px; border-radius: 3px; display: inline-block; }
        .node-status.pending { background: #3a3a5a; color: #888; }
        .node-status.running { background: #ffd93d; color: #000; }
        .node-status.completed { background: #6bcb77; color: #000; }
        .node-status.failed { background: #ff4757; color: #fff; }
        
        /* 节点类型颜色 */
        .node-start .node-header { background: #1a3a2a; border-bottom: 2px solid #6bcb77; }
        .node-end .node-header { background: #3a1a1a; border-bottom: 2px solid #ff4757; }
        .node-agent .node-header { background: #1a2a3a; border-bottom: 2px solid #4dabf7; }
        .node-tool_call .node-header { background: #2a2a1a; border-bottom: 2px solid #ffd93d; }
        .node-condition .node-header { background: #2a1a2a; border-bottom: 2px solid #da77f2; }
        .node-trigger .node-header { background: #1a1a2a; border-bottom: 2px solid #00d4ff; }
        
        /* 连接线 */
        .connections { position: absolute; top: 0; left: 0; pointer-events: none; }
        .connection { stroke: #3a3a6a; stroke-width: 2; fill: none; }
        .connection:hover { stroke: #00d4ff; stroke-width: 3; }
        .connection.selected { stroke: #ff6b6b; }
        
        /* 右侧面板 - 属性 */
        .properties { width: 280px; background: #1a1a2e; border-left: 1px solid #2a2a4a; padding: 16px; overflow-y: auto; }
        .properties h3 { font-size: 14px; color: #00d4ff; margin-bottom: 16px; }
        .prop-group { margin-bottom: 16px; }
        .prop-group label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .prop-group input, .prop-group select, .prop-group textarea { width: 100%; background: #252540; border: 1px solid #3a3a5a; border-radius: 6px; padding: 8px 10px; color: #e0e0e0; font-size: 13px; outline: none; }
        .prop-group input:focus, .prop-group select:focus, .prop-group textarea:focus { border-color: #00d4ff; }
        .prop-group textarea { min-height: 80px; resize: vertical; font-family: monospace; }
        .prop-row { display: flex; gap: 8px; }
        .prop-row .prop-group { flex: 1; }
        
        .no-selection { color: #555; text-align: center; padding: 40px 20px; font-size: 13px; line-height: 1.6; }
        
        /* 模板弹窗 */
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; }
        .modal { background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 12px; padding: 24px; max-width: 600px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal h2 { color: #00d4ff; margin-bottom: 16px; font-size: 18px; }
        .template-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .template-card { background: #252540; border: 1px solid #3a3a5a; border-radius: 8px; padding: 16px; cursor: pointer; transition: all 0.2s; }
        .template-card:hover { border-color: #00d4ff; transform: translateY(-2px); }
        .template-card h4 { color: #fff; margin-bottom: 6px; }
        .template-card p { color: #888; font-size: 12px; line-height: 1.4; }
        .template-card .category { display: inline-block; background: #00d4ff; color: #0a0a1e; font-size: 10px; padding: 2px 8px; border-radius: 3px; margin-bottom: 8px; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
        .modal-actions button { background: #2a2a4a; border: 1px solid #3a3a5a; color: #e0e0e0; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
        .modal-actions button:hover { background: #3a3a5a; }
        .modal-actions button.primary { background: #00d4ff; color: #0a0a1e; border-color: #00d4ff; }
        
        /* 执行结果 */
        .exec-result { background: #0a0a1e; border: 1px solid #3a3a5a; border-radius: 8px; padding: 16px; margin-top: 16px; max-height: 300px; overflow-y: auto; }
        .exec-result pre { font-family: 'Fira Code', monospace; font-size: 11px; color: #aaa; white-space: pre-wrap; word-break: break-all; }
        
        /* Toast */
        .toast { position: fixed; bottom: 20px; right: 20px; background: #2a2a4a; border: 1px solid #3a3a5a; border-radius: 8px; padding: 12px 20px; font-size: 13px; z-index: 2000; animation: slideIn 0.3s ease; }
        .toast.success { border-color: #6bcb77; background: #1a3a2a; }
        .toast.error { border-color: #ff4757; background: #3a1a1a; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        
        /* 右键菜单 */
        .context-menu { position: fixed; background: #1a1a2e; border: 1px solid #3a3a5a; border-radius: 8px; padding: 4px; z-index: 1000; min-width: 150px; }
        .context-menu-item { padding: 8px 16px; cursor: pointer; border-radius: 4px; font-size: 13px; }
        .context-menu-item:hover { background: #2a2a5a; }
        .context-menu-item.danger:hover { background: #3a1a1a; color: #ff4757; }
        
        /* Mini-map */
        .minimap { position: absolute; right: 16px; bottom: 16px; width: 160px; height: 100px; background: rgba(26,26,46,0.9); border: 1px solid #3a3a5a; border-radius: 8px; overflow: hidden; }
        .minimap-content { width: 100%; height: 100%; position: relative; }
        .minimap-node { position: absolute; background: #00d4ff; border-radius: 2px; opacity: 0.7; }
        
        /* 状态栏 */
        .statusbar { background: #1a1a2e; border-top: 1px solid #2a2a4a; padding: 6px 20px; font-size: 11px; color: #666; display: flex; gap: 20px; }
        .statusbar span { display: flex; align-items: center; gap: 4px; }
        .statusbar .dot { width: 6px; height: 6px; border-radius: 50%; }
        .dot.green { background: #6bcb77; }
        .dot.yellow { background: #ffd93d; }
        .dot.red { background: #ff4757; }
        
        /* Loading spinner */
        .spinner { width: 20px; height: 20px; border: 2px solid #3a3a5a; border-top-color: #00d4ff; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        
        /* 响应式设计 */
        @media (max-width: 1024px) {
            .sidebar { width: 180px; }
            .properties { width: 240px; }
        }
        
        @media (max-width: 768px) {
            .sidebar { width: 60px; padding: 8px; }
            .sidebar h3 { display: none; }
            .palette-item { padding: 8px; }
            .palette-item .icon { margin: 0; }
            .palette-item .type { display: none; }
            .properties { width: 200px; }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Header -->
        <div class="header">
            <span class="logo">🐍</span>
            <h1>SerpentAI 工作流编辑器</h1>
            <div style="flex:1"></div>
            <div class="toolbar">
                <button id="btn-templates">📋 模板</button>
                <button id="btn-new">✨ 新建</button>
                <button id="btn-save" disabled>💾 保存</button>
                <button id="btn-execute" class="primary" disabled>▶ 执行</button>
                <button id="btn-validate" disabled>🔍 验证</button>
                <button id="btn-clear">🗑️ 清空</button>
            </div>
        </div>
        
        <!-- Main -->
        <div class="main">
            <!-- Sidebar - Node Types -->
            <div class="sidebar">
                <h3>节点类型</h3>
                <div class="node-palette" id="node-palette"></div>
            </div>
            
            <!-- Canvas -->
            <div class="canvas-container" id="canvas-container">
                <div class="canvas" id="canvas">
                    <div class="canvas-bg"></div>
                    
                    <!-- SVG Connections -->
                    <svg class="connections" id="connections"></svg>
                    
                    <!-- Nodes will be added here dynamically -->
                </div>
                
                <!-- Mini-map -->
                <div class="minimap" id="minimap" style="display:none;">
                    <div class="minimap-content" id="minimap-content"></div>
                </div>
            </div>
            
            <!-- Properties Panel -->
            <div class="properties" id="properties">
                <div class="no-selection" id="no-selection">
                    <p>👈 从左侧拖拽节点到画布</p>
                    <p style="margin-top:12px;color:#444;">或选择一个节点查看属性</p>
                </div>
                <div id="property-form" style="display:none;"></div>
                
                <!-- Workflow Info -->
                <div id="workflow-info" style="margin-top:24px; padding-top:16px; border-top:1px solid #2a2a4a; display:none;">
                    <h3>工作流信息</h3>
                    <div style="font-size:12px;color:#888;line-height:1.8;">
                        <div>名称: <span id="info-name" style="color:#e0e0e0;"></span></div>
                        <div>节点: <span id="info-nodes" style="color:#e0e0e0;"></span></div>
                        <div>连接: <span id="info-edges" style="color:#e0e0e0;"></span></div>
                        <div>状态: <span id="info-status" style="color:#888;"></span></div>
                    </div>
                </div>
                
                <!-- Execution Result -->
                <div id="exec-result" class="exec-result" style="display:none;"></div>
            </div>
        </div>
        
        <!-- Status Bar -->
        <div class="statusbar">
            <span><span class="dot green"></span> API: <span id="status-api">localhost:8000</span></span>
            <span><span class="dot green"></span> 工作流引擎</span>
            <span id="status-nodes">0 节点</span>
            <span id="status-edges">0 连接</span>
            <span id="status-selected" style="display:none;">选中: <span></span></span>
        </div>
    </div>
    
    <!-- Template Modal -->
    <div class="modal-overlay" id="template-modal" style="display:none;">
        <div class="modal">
            <h2>📋 选择模板</h2>
            <div class="template-grid" id="template-list"></div>
            <div class="modal-actions">
                <button id="btn-close-template-modal">取消</button>
            </div>
        </div>
    </div>
    
    <!-- Context Menu -->
    <div class="context-menu" id="context-menu" style="display:none;">
        <div class="context-menu-item" id="ctx-copy">📋 复制</div>
        <div class="context-menu-item" id="ctx-paste">📝 粘贴</div>
        <div class="context-menu-item" id="ctx-duplicate">🔗 复制节点</div>
        <div class="context-menu-item danger" id="ctx-delete">🗑️ 删除</div>
    </div>
    
    <!-- Toast -->
    <div class="toast" id="toast" style="display:none;"></div>
    
    <script>
        // ============== 配置 ==============
        const API = 'http://localhost:8000/api';
        
        // ============== 状态管理 ==============
        const state = {
            currentWorkflow: null,
            nodes: [],
            edges: [],
            selectedNode: null,
            selectedEdge: null,
            workflowStatus: 'draft',
            execResult: null,
            showTemplates: false,
            templates: [],
            isLoading: false,
            
            // Drag state
            dragNode: null,
            dragOffset: { x: 0, y: 0 },
            
            // Context menu
            contextMenu: null,
            clipboard: null
        };
        
        // ============== 节点类型定义 ==============
        const nodeCategories = [
            { name: '触发器', types: [
                { type: 'trigger', name: 'Webhook触发', icon: '⚡', category: 'trigger' },
                { type: 'schedule', name: '定时触发', icon: '⏰', category: 'trigger' },
            ]},
            { name: '智能体', types: [
                { type: 'agent', name: 'AI智能体', icon: '🤖', category: 'agent' },
                { type: 'tool_call', name: '工具调用', icon: '🔧', category: 'agent' },
                { type: 'condition', name: '条件分支', icon: '🔀', category: 'agent' },
                { type: 'parallel', name: '并行执行', icon: '⚡', category: 'agent' },
                { type: 'loop', name: '循环', icon: '🔁', category: 'agent' },
            ]},
            { name: '数据', types: [
                { type: 'input', name: '输入', icon: '📥', icon: '📥', category: 'data' },
                { type: 'output', name: '输出', icon: '📤', category: 'data' },
                { type: 'transform', name: '数据转换', icon: '🔄', category: 'data' },
                { type: 'filter', name: '数据过滤', icon: '🔍', category: 'data' },
            ]},
            { name: '集成', types: [
                { type: 'http', name: 'HTTP请求', icon: '🌐', category: 'integration' },
                { type: 'database', name: '数据库', icon: '💾', category: 'integration' },
                { type: 'message', name: '发送消息', icon: '💬', category: 'integration' },
                { type: 'notification', name: '通知', icon: '🔔', category: 'integration' },
                { type: 'email', name: '邮件', icon: '📧', category: 'integration' },
            ]},
            { name: '工具', types: [
                { type: 'code', name: '代码执行', icon: '💻', category: 'tool' },
                { type: 'template', name: '模板渲染', icon: '📝', category: 'tool' },
                { type: 'math', name: '数学计算', icon: '🔢', category: 'tool' },
            ]},
            { name: '控制', types: [
                { type: 'start', name: '开始', icon: '▶️', category: 'control' },
                { type: 'end', name: '结束', icon: '⏹️', category: 'control' },
                { type: 'log', name: '日志', icon: '📋', category: 'control' },
            ]},
        ];
        
        // ============== 工具函数 ==============
        
        /**
         * 显示 toast 通知
         */
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }
        
        /**
         * 显示/隐藏加载状态
         */
        function showLoading(show) {
            state.isLoading = show;
            // 可以在这里添加全局加载指示器
        }
        
        /**
         * 获取默认名称
         */
        function getDefaultName(type) {
            const names = {
                start: '开始', end: '结束', agent: 'AI智能体', tool_call: '工具调用',
                condition: '条件分支', parallel: '并行执行', loop: '循环',
                input: '输入', output: '输出', transform: '数据转换', filter: '数据过滤',
                http: 'HTTP请求', database: '数据库', message: '发送消息',
                notification: '通知', email: '邮件', code: '代码执行',
                template: '模板渲染', math: '数学计算', log: '日志',
                trigger: '触发器', schedule: '定时器'
            };
            return names[type] || type;
        }
        
        /**
         * 获取默认配置
         */
        function getDefaultConfig(type) {
            const configs = {
                agent: { timeout: 30, agent_model: 'gpt-4', agent_temperature: 0.7, agent_system_prompt: '' },
                tool_call: { timeout: 30, tool_name: '', tool_args: {} },
                condition: { condition_expression: '' },
                http: { http_method: 'GET', http_url: '', http_headers: {} },
                message: { message_content: '' },
                code: { code_language: 'python', code_content: '' },
                template: { template_content: '' },
                log: { message_content: '' }
            };
            return configs[type] || {};
        }
        
        /**
         * 获取节点图标
         */
        function getNodeIcon(type) {
            const icons = {
                start: '▶️', end: '⏹️', agent: '🤖', tool_call: '🔧',
                condition: '🔀', parallel: '⚡', loop: '🔁',
                input: '📥', output: '📤', transform: '🔄', filter: '🔍',
                http: '🌐', database: '💾', message: '💬',
                notification: '🔔', email: '📧', code: '💻',
                template: '📝', math: '🔢', log: '📋',
                trigger: '⚡', schedule: '⏰'
            };
            return icons[type] || '📦';
        }
        
        /**
         * 获取节点配置摘要
         */
        function getNodeConfigSummary(node) {
            if (node.type === 'agent') return node.config?.agent_model || '';
            if (node.type === 'tool_call') return node.config?.tool_name || '';
            if (node.type === 'http') return `${node.config?.http_method || 'GET'} ${(node.config?.http_url || '').substring(0, 20)}...`;
            return '';
        }
        
        /**
         * 生成唯一 ID
         */
        function generateId() {
            return 'node_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        }
        
        /**
         * 计算连接线路径
         */
        function getEdgePath(edge) {
            const source = state.nodes.find(n => n.id === edge.source);
            const target = state.nodes.find(n => n.id === edge.target);
            if (!source || !target) return '';
            
            const sx = source.position_x + 140;
            const sy = source.position_y + 50;
            const tx = target.position_x;
            const ty = target.position_y + 50;
            
            const midX = (sx + tx) / 2;
            
            return `M ${sx} ${sy} C ${midX} ${sy}, ${midX} ${ty}, ${tx} ${ty}`;
        }
        
        // ============== 渲染函数 ==============
        
        /**
         * 渲染节点面板
         */
        function renderNodePalette() {
            const palette = document.getElementById('node-palette');
            palette.innerHTML = '';
            
            nodeCategories.forEach(cat => {
                const title = document.createElement('div');
                title.style.cssText = 'font-size:11px;color:#555;margin:10px 0 4px;';
                title.textContent = cat.name;
                palette.appendChild(title);
                
                cat.types.forEach(type => {
                    const item = document.createElement('div');
                    item.className = 'palette-item';
                    item.draggable = true;
                    item.dataset.nodeType = type.type;
                    item.innerHTML = `
                        <span class="icon">${type.icon}</span>
                        <span>${type.name}</span>
                        <span class="type">${type.category}</span>
                    `;
                    
                    item.addEventListener('dragstart', (e) => {
                        e.dataTransfer.setData('nodeType', type.type);
                        e.dataTransfer.effectAllowed = 'copy';
                    });
                    
                    palette.appendChild(item);
                });
            });
        }
        
        /**
         * 渲染节点
         */
        function renderNodes() {
            const canvas = document.getElementById('canvas');
            
            // 移除已有的节点（保留背景和连接线）
            canvas.querySelectorAll('.workflow-node').forEach(n => n.remove());
            
            // 添加节点
            state.nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = `workflow-node node-${node.type}${state.selectedNode === node.id ? ' selected' : ''}${node.status === 'running' ? ' running' : ''}${node.status === 'completed' ? ' completed' : ''}${node.status === 'failed' ? ' failed' : ''}`;
                el.id = node.id;
                el.style.left = node.position_x + 'px';
                el.style.top = node.position_y + 'px';
                
                el.innerHTML = `
                    <div class="node-header">
                        <span class="node-icon">${getNodeIcon(node.type)}</span>
                        <span class="node-title">${node.name}</span>
                        <span class="node-type">${node.type}</span>
                    </div>
                    <div class="node-body">
                        <div class="node-config">${getNodeConfigSummary(node)}</div>
                        ${node.status ? `<div class="node-status ${node.status}">${node.status}</div>` : ''}
                    </div>
                `;
                
                // 事件监听
                el.addEventListener('mousedown', (e) => onNodeMouseDown(e, node));
                el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectNode(node.id);
                });
                
                canvas.appendChild(el);
            });
            
            updateMinimap();
            updateStatusbar();
        }
        
        /**
         * 渲染连接线
         */
        function renderEdges() {
            const svg = document.getElementById('connections');
            svg.innerHTML = '';
            
            // 添加箭头标记
            const defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
            const marker = document.createElementNS('http://www.w3.org/2000/svg', 'marker');
            marker.setAttribute('id', 'arrowhead');
            marker.setAttribute('markerWidth', '10');
            marker.setAttribute('markerHeight', '7');
            marker.setAttribute('refX', '9');
            marker.setAttribute('refY', '3.5');
            marker.setAttribute('orient', 'auto');
            
            const polygon = document.createElementNS('http://www.w3.org/2000/svg', 'polygon');
            polygon.setAttribute('points', '0 0, 10 3.5, 0 7');
            polygon.setAttribute('fill', '#3a3a6a');
            marker.appendChild(polygon);
            defs.appendChild(marker);
            svg.appendChild(defs);
            
            // 添加连接线
            state.edges.forEach(edge => {
                const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                path.setAttribute('d', getEdgePath(edge));
                path.className = 'connection' + (state.selectedEdge === edge.id ? ' selected' : '');
                path.addEventListener('click', (e) => {
                    e.stopPropagation();
                    selectEdge(edge.id);
                });
                svg.appendChild(path);
            });
        }

         */

            const propertyForm = document.getElementById('property-form');

                noSelection.style.display = 'block';
                propertyForm.style.display = 'none';

            }
            
            noSelection.style.display = 'none';

            const node = state.nodes.find(n => n.id === state.selectedNode);

            let html = `

                </div>
                <div class="prop-group">
                    <label>类型</label>
                    <input type="text" value="${node.type}" disabled>
                </div>
                <div class="prop-row">

                        <label>X 位置</label>
                        <input type="number" value="${node.position_x}" onchange="updateNodePosition('x', parseInt(this.value))">
                    </div>
                    <div class="prop-group">
                        <label>Y 位置</label>
                        <input type="number" value="${node.position_y}" onchange="updateNodePosition('y', parseInt(this.value))">
                    </div>
                </div>
                <div class="prop-group">

                html += `
                    <div class="prop-group">
                        <label>模型</label>
                        <select onchange="updateNodeConfig('agent_model', this.value)">
                            <option value="gpt-4" ${node.config?.agent_model === 'gpt-4' ? 'selected' : ''}>GPT-4</option>
                            <option value="gpt-3.5-turbo" ${node.config?.agent_model === 'gpt-3.5-turbo' ? 'selected' : ''}>GPT-3.5 Turbo</option>
                            <option value="claude-3" ${node.config?.agent_model === 'claude-3' ? 'selected' : ''}>Claude 3</option>
                            <option value="llama-3-8b" ${node.config?.agent_model === 'llama-3-8b' ? 'selected' : ''}>Llama 3 8B (本地)</option>
                        </select>
                    </div>
                    <div class="prop-group">
                        <label>系统提示词</label>
                        <textarea onchange="updateNodeConfig('agent_system_prompt', this.value)">${node.config?.agent_system_prompt || ''}</textarea>

            }
            
            if (node.type === 'tool_call') {
                html += `
                    <div class="prop-group">
                        <label>工具名称</label>
                        <input type="text" value="${node.config?.tool_name || ''}" onchange="updateNodeConfig('tool_name', this.value)" placeholder="fs_read, shell_exec, etc.">
                    </div>
                `;
            }
            
            if (node.type === 'condition') {
                html += `
                    <div class="prop-group">
                        <label>条件表达式</label>
                        <textarea onchange="updateNodeConfig('condition_expression', this.value)" placeholder="result > 0">${node.config?.condition_expression || ''}</textarea>
                    </div>
                `;
            }
            
            if (node.type === 'http') {
                html += `
                    <div class="prop-group">
                        <label>HTTP 方法</label>
                        <select onchange="updateNodeConfig('http_method', this.value)">
                            <option value="GET" ${node.config?.http_method === 'GET' ? 'selected' : ''}>GET</option>
                            <option value="POST" ${node.config?.http_method === 'POST' ? 'selected' : ''}>POST</option>
                            <option value="PUT" ${node.config?.http_method === 'PUT' ? 'selected' : ''}>PUT</option>
                            <option value="DELETE" ${node.config?.http_method === 'DELETE' ? 'selected' : ''}>DELETE</option>
                        </select>
                    </div>
                    <div class="prop-group">
                        <label>URL</label>
                        <input type="text" value="${node.config?.http_url || ''}" onchange="updateNodeConfig('http_url', this.value)" placeholder="https://api.example.com/data">

            }
            
            if (node.type === 'message') {
                html += `
                    <div class="prop-group">
                        <label>消息内容</label>
                        <textarea onchange="updateNodeConfig('message_content', this.value)" placeholder="使用 {变量名} 引用上下文变量">${node.config?.message_content || ''}</textarea>
                    </div>

            }
            
            html += `
                <div style="margin-top:20px; display:flex; gap:8px;">
                    <button class="danger" onclick="deleteSelectedNode()" style="flex:1">🗑️ 删除节点</button>
                </div>

            propertyForm.innerHTML = html;

        /**
         * 更新工作流信息
         */
        function updateWorkflowInfo() {
            const info = document.getElementById('workflow-info');
            
            if (!state.currentWorkflow) {
                info.style.display = 'none';
                return;
            }
            
            info.style.display = 'block';
            document.getElementById('info-name').textContent = state.currentWorkflow.name || '未命名';
            document.getElementById('info-nodes').textContent = state.nodes.length;
            document.getElementById('info-edges').textContent = state.edges.length;
            
            const statusEl = document.getElementById('info-status');
            statusEl.textContent = state.workflowStatus;
            statusEl.style.color = state.workflowStatus === 'active' ? '#6bcb77' : '#888';
        }
        
        /**
         * 更新小地图
         */
        function updateMinimap() {
            const minimap = document.getElementById('minimap');
            const content = document.getElementById('minimap-content');
            
            if (state.nodes.length === 0) {
                minimap.style.display = 'none';
                return;
            }
            
            minimap.style.display = 'block';
            content.innerHTML = '';
            
            state.nodes.forEach(node => {
                const el = document.createElement('div');
                el.className = 'minimap-node';
                el.style.left = (node.position_x / 30) + 'px';
                el.style.top = (node.position_y / 30) + 'px';
                el.style.width = '8px';
                el.style.height = '4px';
                content.appendChild(el);
            });
        }
        
        /**
         * 更新状态栏
         */
        function updateStatusbar() {
            document.getElementById('status-nodes').textContent = state.nodes.length + ' 节点';
            document.getElementById('status-edges').textContent = state.edges.length + ' 连接';
            
            const selected = document.getElementById('status-selected');
            if (state.selectedNode) {
                const node = state.nodes.find(n => n.id === state.selectedNode);
                selected.style.display = 'block';
                selected.querySelector('span').textContent = node?.name || '';
            } else {
                selected.style.display = 'none';
            }
        }
        
        /**
         * 渲染模板列表
         */
        function renderTemplates() {
            const list = document.getElementById('template-list');
            list.innerHTML = '';
            
            state.templates.forEach(tpl => {
                const card = document.createElement('div');
                card.className = 'template-card';
                card.innerHTML = `
                    <div class="category">${tpl.category || 'other'}</div>
                    <h4>${tpl.name}</h4>
                    <p>${tpl.description || '暂无描述'}</p>
                `;
                
                card.addEventListener('click', () => createFromTemplate(tpl.id));
                list.appendChild(card);

        /**
         * 显示执行结果
         */
        function showExecResult(result) {
            const el = document.getElementById('exec-result');
            el.style.display = 'block';
            el.innerHTML = `
                <div style="font-size:11px;color:#888;margin-bottom:8px;">执行结果</div>
                <pre>${JSON.stringify(result, null, 2)}</pre>
            `;
        }
        
        // ============== 事件处理 ==============
        
        /**
         * 选择节点
         */
        function selectNode(nodeId) {
            state.selectedNode = nodeId;
            state.selectedEdge = null;
            renderNodes();
            updatePropertyPanel();
            updateWorkflowInfo();
        }
        
        /**
         * 选择连接线
         */
        function selectEdge(edgeId) {
            state.selectedEdge = edgeId;
            state.selectedNode = null;
            renderNodes();
            renderEdges();
            updatePropertyPanel();
        }
        
        /**
         * 更新节点属性
         */
        function updateNodeProperty(prop, value) {
            const node = state.nodes.find(n => n.id === state.selectedNode);
            if (!node) return;
            
            node[prop] = value;
            renderNodes();
        }
        
        /**
         * 更新节点位置
         */
        function updateNodePosition(axis, value) {
            const node = state.nodes.find(n => n.id === state.selectedNode);
            if (!node) return;
            
            if (axis === 'x') node.position_x = value;
            if (axis === 'y') node.position_y = value;
            
            renderNodes();
        }
        
        /**
         * 更新节点配置
         */
        function updateNodeConfig(key, value) {
            const node = state.nodes.find(n => n.id === state.selectedNode);
            if (!node) return;
            
            if (!node.config) node.config = {};
            node.config[key] = value;
            
            // 更新节点显示
            renderNodes();
        }
        
        /**
         * 删除选中的节点
         */
        function deleteSelectedNode() {
            if (!state.selectedNode) return;
            if (!confirm('确定要删除这个节点吗？')) return;
            
            state.nodes = state.nodes.filter(n => n.id !== state.selectedNode);
            state.edges = state.edges.filter(e => e.source !== state.selectedNode && e.target !== state.selectedNode);
            state.selectedNode = null;
            
            renderNodes();
            renderEdges();
            updatePropertyPanel();
            updateWorkflowInfo();
            
            showToast('节点已删除');
        }
        
        /**
         * 节点鼠标按下事件
         */
        function onNodeMouseDown(e, node) {
            e.stopPropagation();
            selectNode(node.id);
            
            state.dragNode = node;
            const rect = document.getElementById('canvas').getBoundingClientRect();
            state.dragOffset = {
                x: e.clientX - rect.left - node.position_x,
                y: e.clientY - rect.top - node.position_y
            };
        }
        
        /**
         * 画布鼠标移动事件
         */
        function onCanvasMouseMove(e) {
            if (!state.dragNode) return;
            
            const rect = document.getElementById('canvas').getBoundingClientRect();
            state.dragNode.position_x = Math.max(0, e.clientX - rect.left - state.dragOffset.x);
            state.dragNode.position_y = Math.max(0, e.clientY - rect.top - state.dragOffset.y);
            
            renderNodes();
        }
        
        /**
         * 画布鼠标抬起事件
         */
        function onCanvasMouseUp() {
            state.dragNode = null;
        }
        
        /**
         * 画布点击事件
         */
        function onCanvasClick(e) {
            if (e.target.id === 'canvas' || e.target.className === 'canvas-bg') {
                state.selectedNode = null;
                state.selectedEdge = null;
                renderNodes();
                renderEdges();
                updatePropertyPanel();
            }
        }
        
        /**
         * 右键菜单事件
         */
        function onContextMenu(e) {
            e.preventDefault();
            
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = e.clientX + 'px';
            menu.style.top = e.clientY + 'px';
            
            state.contextMenu = { x: e.clientX, y: e.clientY };
        }
        
        /**
         * 复制节点
         */
        function copyNode() {
            if (!state.selectedNode) return;
            
            const node = state.nodes.find(n => n.id === state.selectedNode);
            if (!node) return;
            
            state.clipboard = JSON.parse(JSON.stringify(node));
            showToast('节点已复制');
            
            document.getElementById('context-menu').style.display = 'none';
        }
        
        /**
         * 粘贴节点
         */
        function pasteNode() {
            if (!state.clipboard) return;
            
            const newNode = {
                ...JSON.parse(JSON.stringify(state.clipboard)),
                id: generateId(),
                position_x: state.clipboard.position_x + 50,
                position_y: state.clipboard.position_y + 50
            };
            
            state.nodes.push(newNode);
            selectNode(newNode.id);
            
            showToast('节点已粘贴');
            
            document.getElementById('context-menu').style.display = 'none';
        }
        
        /**
         * 复制节点（快捷键）
         */
        function duplicateNode() {
            copyNode();
            pasteNode();
        }
        
        // ============== API 调用 ==============
        
        /**
         * 加载模板列表
         */
        async function loadTemplates() {
            try {
                const resp = await fetch(`${API}/workflow/templates`);
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                
                state.templates = await resp.json();
                renderTemplates();
            } catch (e) {
                console.error('加载模板失败', e);
                // 使用默认模板
                state.templates = [
                    { id: 'simple-chat', name: '简单对话', description: '基础的 AI 对话工作流', category: '基础' },
                    { id: 'data-processing', name: '数据处理', description: '数据清洗和转换工作流', category: '数据' },
                    { id: 'web-scraping', name: '网页抓取', description: '自动抓取网页数据', category: '网络' }
                ];
                renderTemplates();
            }
        }
        
        /**
         * 从模板创建
         */
        async function createFromTemplate(templateId) {
            try {
                showLoading(true);
                
                const resp = await fetch(`${API}/workflow/templates/${templateId}`, {
                    method: 'POST'
                });
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                
                const data = await resp.json();
                state.currentWorkflow = data;
                
                // 解析节点和连接
                state.nodes = (data.nodes || []).map(n => ({
                    id: n.id,
                    name: n.name,
                    type: n.type,
                    position_x: n.position?.x || 100,
                    position_y: n.position?.y || 200,
                    config: n.config || {},
                    status: n.status || 'pending'
                }));
                
                state.edges = (data.edges || []).map(e => ({
                    id: e.id,
                    source: e.source,
                    target: e.target,
                    source_port: e.sourcePort || 'out',
                    target_port: e.targetPort || 'in',
                    label: e.label || ''
                }));
                
                state.workflowStatus = 'draft';
                state.execResult = null;
                
                // 更新 UI
                renderNodes();
                renderEdges();
                updatePropertyPanel();
                updateWorkflowInfo();
                
                // 关闭弹窗
                document.getElementById('template-modal').style.display = 'none';
                
                showToast('模板创建成功');
            } catch (e) {
                console.error('模板创建失败', e);
                showToast('模板创建失败: ' + e.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        /**
         * 新建工作流
         */
        async function newWorkflow() {
            try {
                showLoading(true);
                
                const resp = await fetch(`${API}/workflow`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: '未命名工作流',
                        description: ''
                    })
                });
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                
                state.currentWorkflow = await resp.json();
                state.nodes = [];
                state.edges = [];
                state.workflowStatus = 'draft';
                state.execResult = null;
                
                // 更新 UI
                renderNodes();
                renderEdges();
                updatePropertyPanel();
                updateWorkflowInfo();
                
                // 启用按钮
                document.getElementById('btn-save').disabled = false;
                document.getElementById('btn-execute').disabled = false;
                document.getElementById('btn-validate').disabled = false;
                
                showToast('新建工作流成功');
            } catch (e) {
                console.error('创建失败', e);
                showToast('创建失败: ' + e.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        /**
         * 保存工作流
         */
        async function saveWorkflow() {
            if (!state.currentWorkflow) return;
            
            try {
                showLoading(true);
                
                const workflowData = {
                    ...state.currentWorkflow,
                    nodes: state.nodes.map(n => ({
                        id: n.id,
                        name: n.name,
                        type: n.type,
                        position: { x: n.position_x, y: n.position_y },
                        config: n.config
                    })),
                    edges: state.edges.map(e => ({
                        id: e.id,
                        source: e.source,
                        target: e.target,
                        sourcePort: e.source_port,
                        targetPort: e.target_port
                    }))
                };
                
                const resp = await fetch(`${API}/workflow/${state.currentWorkflow.id}`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(workflowData)
                });
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText()}`);
                
                showToast('保存成功');
            } catch (e) {
                console.error('保存失败', e);
                showToast('保存失败: ' + e.message, 'error');
            } finally {
                showLoading(false);
            }
        }
        
        /**
         * 执行工作流
         */
        async function executeWorkflow() {
            if (!state.currentWorkflow) return;
            
            try {
                state.workflowStatus = 'running';
                state.execResult = null;
                updateWorkflowInfo();
                
                // 标记所有节点为运行中
                state.nodes.forEach(n => n.status = 'running');
                renderNodes();
                
                // 禁用执行按钮
                document.getElementById('btn-execute').textContent = '运行中...';
                document.getElementById('btn-execute').disabled = true;
                
                const resp = await fetch(`${API}/workflow/execute`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workflow_id: state.currentWorkflow.id,
                        input_data: {}
                    })
                });
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                
                const result = await resp.json();
                state.execResult = result;
                
                // 更新节点状态
                if (result.results) {
                    for (const [nodeId, nodeResult] of Object.entries(result.results)) {
                        const node = state.nodes.find(n => n.id === nodeId);
                        if (node) {
                            node.status = nodeResult?.error ? 'failed' : 'completed';
                            if (nodeResult?.error) node.error = nodeResult.error;
                        }
                    }
                }
                
                state.workflowStatus = result.status === 'completed' ? 'active' : 'failed';
                showToast(result.status === 'completed' ? '执行成功' : '执行失败', result.status === 'completed' ? 'success' : 'error');
                
                // 显示执行结果
                showExecResult(result);
                
                // 更新 UI
                renderNodes();
                updateWorkflowInfo();
            } catch (e) {
                console.error('执行失败', e);
                state.workflowStatus = 'failed';
                showToast('执行失败: ' + e.message, 'error');
                
                // 重置节点状态
                state.nodes.forEach(n => n.status = 'pending');
                renderNodes();
                updateWorkflowInfo();
            } finally {
                // 恢复执行按钮
                document.getElementById('btn-execute').textContent = '▶ 执行';
                document.getElementById('btn-execute').disabled = false;
            }
        }
        
        /**
         * 验证工作流
         */
        async function validateWorkflow() {
            if (!state.currentWorkflow) return;
            
            try {
                const resp = await fetch(`${API}/workflow/${state.currentWorkflow.id}/validate`, {
                    method: 'POST'
                });
                
                if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                
                const result = await resp.json();
                if (result.valid) {
                    showToast('工作流验证通过');
                } else {
                    showToast('验证失败: ' + (result.errors || []).join(', '), 'error');
                }
            } catch (e) {
                console.error('验证失败', e);
                showToast('验证失败: ' + e.message, 'error');
            }
        }
        
        /**
         * 清空画布
         */
        function clearCanvas() {
            if (!confirm('确定清空画布？')) return;
            
            state.nodes = [];
            state.edges = [];
            state.selectedNode = null;
            state.selectedEdge = null;
            state.execResult = null;
            state.workflowStatus = 'draft';
            
            renderNodes();
            renderEdges();
            updatePropertyPanel();
            updateWorkflowInfo();
            
            showToast('画布已清空');
        }
        
        // ============== 拖放处理 ==============
        
        /**
         * 处理拖放
         */
        function onDrop(e) {
            e.preventDefault();
            
            const type = e.dataTransfer.getData('nodeType');
            if (!type) return;
            
            const rect = document.getElementById('canvas').getBoundingClientRect();
            const x = e.clientX - rect.left + document.getElementById('canvas').scrollLeft;
            const y = e.clientY - rect.top + document.getElementById('canvas').scrollTop;
            
            const newNode = {
                id: generateId(),
                name: getDefaultName(type),
                type: type,
                position_x: x,
                position_y: y,
                config: getDefaultConfig(type),
                status: 'pending'
            };
            
            state.nodes.push(newNode);
            selectNode(newNode.id);
            
            showToast('节点已添加: ' + newNode.name);
        }
        
        // ============== 初始化 ==============
        
        /**
         * 初始化事件监听
         */
        function initEventListeners() {
            // 工具栏按钮
            document.getElementById('btn-templates').addEventListener('click', () => {
                document.getElementById('template-modal').style.display = 'flex';
                loadTemplates();
            });
            
            document.getElementById('btn-new').addEventListener('click', () => newWorkflow());
            document.getElementById('btn-save').addEventListener('click', () => saveWorkflow());
            document.getElementById('btn-execute').addEventListener('click', () => executeWorkflow());
            document.getElementById('btn-validate').addEventListener('click', () => validateWorkflow());
            document.getElementById('btn-clear').addEventListener('click', () => clearCanvas());
            
            // 模板弹窗关闭
            document.getElementById('btn-close-template-modal').addEventListener('click', () => {
                document.getElementById('template-modal').style.display = 'none';
            });
            
            // 画布事件
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('click', onCanvasClick);
            canvas.addEventListener('mousemove', onCanvasMouseMove);
            canvas.addEventListener('mouseup', onCanvasMouseUp);
            canvas.addEventListener('contextmenu', onContextMenu);
            
            // 拖放事件
            const canvasContainer = document.getElementById('canvas-container');
            canvasContainer.addEventListener('drop', onDrop);
            canvasContainer.addEventListener('dragover', (e) => e.preventDefault());
            
            // 右键菜单
            document.getElementById('ctx-copy').addEventListener('click', copyNode);
            document.getElementById('ctx-paste').addEventListener('click', pasteNode);
            document.getElementById('ctx-duplicate').addEventListener('click', duplicateNode);
            document.getElementById('ctx-delete').addEventListener('click', deleteSelectedNode);
            
            // 点击其他地方关闭右键菜单
            document.addEventListener('click', () => {
                document.getElementById('context-menu').style.display = 'none';
            });
            
            // 键盘快捷键
            document.addEventListener('keydown', (e) => {
                // Delete 或 Backspace 删除选中节点
                if ((e.key === 'Delete' || e.key === 'Backspace') && state.selectedNode) {
                    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        deleteSelectedNode();
                    }
                }
                
                // Ctrl+C 复制
                if (e.ctrlKey && e.key === 'c' && state.selectedNode) {
                    copyNode();
                }
                
                // Ctrl+V 粘贴
                if (e.ctrlKey && e.key === 'v') {
                    pasteNode();
                }
                
                // Ctrl+D 复制节点
                if (e.ctrlKey && e.key === 'd' && state.selectedNode) {
                    e.preventDefault();
                    duplicateNode();
                }
            });
        }
        
        /**
         * 初始化
         */
        async function init() {
            // 渲染节点面板
            renderNodePalette();
            
            // 初始化事件监听
            initEventListeners();
            
            // 加载模板
            await loadTemplates();
            
            // 自动创建新工作流
            try {
                await newWorkflow();
            } catch (e) {
                console.log('无法连接到API，使用离线模式');
                showToast('无法连接到API，使用离线模式', 'error');
            }
        }
        
        // 启动应用
        init();
    </script>
</body>
</html>
