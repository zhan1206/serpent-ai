<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>聊天 - SerpentAI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: rgba(255,255,255,0.1);
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo {
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .chat-container {
            flex: 1;
            display: flex;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            padding: 20px;
            gap: 20px;
        }
        .sidebar {
            width: 250px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 15px;
            display: none;
        }
        @media (min-width: 768px) {
            .sidebar { display: block; }
        }
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            overflow: hidden;
        }
        .messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.5;
        }
        .message.user {
            align-self: flex-end;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
        }
        .message.assistant {
            align-self: flex-start;
            background: rgba(255,255,255,0.1);
        }
        .input-area {
            padding: 15px;
            background: rgba(255,255,255,0.05);
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        .input-area input:focus {
            outline: none;
            background: rgba(255,255,255,0.15);
        }
        .input-area button {
            padding: 12px 24px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
        }
        .session-item {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 5px;
        }
        .session-item:hover {
            background: rgba(255,255,255,0.1);
        }
        .session-item.active {
            background: rgba(0,212,255,0.2);
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">SerpentAI</div>
        <div>
            <a href="/" style="color: #fff; text-decoration: none; margin-right: 15px;">首页</a>
            <a href="/settings" style="color: #fff; text-decoration: none;">设置</a>
        </div>
    </header>
    <div class="chat-container">
        <aside class="sidebar">
            <h3 style="margin-bottom: 15px;">会话历史</h3>
            <div id="sessions">
                <div class="session-item active">新对话</div>
            </div>
        </aside>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="message assistant">
                    你好！我是SerpentAI，你的智能AI助手。有什么我可以帮助你的吗？
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="input" placeholder="输入消息..." autocomplete="off">
                <button onclick="sendMessage()">发送</button>
            </div>
        </div>
    </div>
    <script>
        const input = document.getElementById('input');
        const messages = document.getElementById('messages');
        
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
        
        async function sendMessage() {
            const text = input.value.trim();
            if (!text) return;
            
            addMessage('user', text);
            input.value = '';
            
            try {
                const resp = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({message: text})
                });
                const data = await resp.json();
                addMessage('assistant', data.message || '...");
            } catch (e) {
                addMessage('assistant', '抱歉，发生了错误');
            }
        }
        
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            div.textContent = text;
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }
    </script>
</body>
</html>
