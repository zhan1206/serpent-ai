# SerpentAI Production Docker Compose Configuration
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

version: '3.8'

services:
  # SerpentAI 主服务（生产配置）
  serpent-ai:
    build:
      context: .
      dockerfile: Dockerfile.production
    image: serpent-ai:latest
    container_name: serpent-ai-prod
    restart: always  # 生产环境总是重启
    ports:
      - "8000:8000"
    volumes:
      # 数据持久化
      - ./data:/app/data:rw
      - ./backend/logs:/app/backend/logs:rw
      - ./models:/app/models:rw
      - ./config:/app/config:ro
      # 上传文件目录（如果需要）
      - ./uploads:/app/uploads:rw
    environment:
      # 生产环境配置
      - DEBUG=false
      - ENVIRONMENT=production
      - LOG_LEVEL=WARNING
      - LOG_ROTATION=100 MB
      - LOG_RETENTION=30 days
      # 数据库配置
      - SQLITE_URL=sqlite:///app/data/serpent_ai.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD_FILE=/run/secrets/neo4j_password
      # Redis 配置
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
      # 模型配置（从 Secret 读取 API Key）
      - OPENAI_API_KEY_FILE=/run/secrets/openai_api_key
      - ANTHROPIC_API_KEY_FILE=/run/secrets/anthropic_api_key
      # 安全配置
      - SECRET_KEY_FILE=/run/secrets/secret_key
      - ENCRYPTION_KEY_FILE=/run/secrets/encryption_key
      # 监控配置
      - ENABLE_METRICS=true
      - METRICS_PORT=9090
    env_file:
      - .env.production
    secrets:
      - neo4j_password
      - redis_password
      - openai_api_key
      - anthropic_api_key
      - secret_key
      - encryption_key
    depends_on:
      chroma:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - serpent-network
    # 资源限制（生产环境必须）
    deploy:
      resources:
        limits:
          cpus: '4.0'  # 最多使用 4 核 CPU
          memory: 8G  # 最多使用 8GB 内存
        reservations:
          cpus: '2.0'  # 预留 2 核 CPU
          memory: 4G  # 预留 4GB 内存
      restart_policy:
        condition: on-failure
        delay: 10s
        max_attempts: 5
        window: 120s
    # 健康检查（增强版）
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"
    security_opt:
      - no-new-privileges  # 禁止提权

  # ChromaDB 向量数据库（生产配置）
  chroma:
    image: chromadb/chroma:latest
    container_name: serpent-chroma-prod
    restart: always
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/.chroma:rw
      # 备份目录（可选）
      - ./backups/chroma:/backups:rw
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_PATH=/chroma/.chroma
      - ANONYMIZED_TELEMETRY=False  # 禁用遥测
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    healthcheck:
      test: ["CMD", "curl", "-f", "-s", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  # Neo4j 知识图谱数据库（生产配置）
  neo4j:
    image: neo4j:5.15-community
    container_name: serpent-neo4j-prod
    restart: always
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data:rw
      - neo4j-logs:/logs:rw
      - neo4j-plugins:/plugins:rw
      # 备份目录（可选）
      - ./backups/neo4j:/backups:rw
    environment:
      # 认证配置
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      # 插件配置
      - NEO4J_PLUGINS=[{"name":"apoc"},{"name":"graph-data-science"}]
      # 内存配置（生产环境调优）
      - NEO4J_dbms_memory_heap_initial__size=2G
      - NEO4J_dbms_memory_heap_max__size=4G
      - NEO4J_dbms_memory_pagecache_size=2G
      # 网络配置
      - NEO4J_dbms_connectors_default__listen__address=0.0.0.0
      - NEO4J_dbms_connectors_default__advertised__address=neo4j
      # 日志配置
      - NEO4J_dbms_logs_debug_level=WARN
    secrets:
      - neo4j_password
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '4.0'
          memory: 8G
        reservations:
          cpus: '2.0'
          memory: 4G
    healthcheck:
      test: ["CMD", "cypher-shell", "-d", "database=neo4j", "RETURN 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "5"

  # Redis 缓存（生产配置）
  redis:
    image: redis:7-alpine
    container_name: serpent-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data:rw
      - ./config/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf --appendonly yes --requirepass ${REDIS_PASSWORD}
    environment:
      - REDIS_PASSWORD_FILE=/run/secrets/redis_password
    secrets:
      - redis_password
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    sysctls:
      net.core.somaxconn: 65535  # Redis 优化

  # Nginx 反向代理（生产配置）
  nginx:
    image: nginx:alpine
    container_name: serpent-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./config/nginx-ssl.conf:/etc/nginx/nginx-ssl.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx:rw
      # 静态文件（如果有前端）
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      - serpent-ai
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"
    security_opt:
      - no-new-privileges

  # Prometheus 监控（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: serpent-prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus:rw
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    profiles:
      - monitoring

  # Grafana 可视化（可选）
  grafana:
    image: grafana/grafana:latest
    container_name: serpent-grafana
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana:rw
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    environment:
      - GF_SECURITY_ADMIN_USER_FILE=/run/secrets/grafana_admin_user
      - GF_SECURITY_ADMIN_PASSWORD_FILE=/run/secrets/grafana_admin_password
    secrets:
      - grafana_admin_user
      - grafana_admin_password
    depends_on:
      - prometheus
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 1G
    profiles:
      - monitoring"

  # ELK Stack - Elasticsearch（可选，日志收集）
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: serpent-elasticsearch
    restart: always
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data:rw
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx2g"
    networks:
      - serpent-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G
    profiles:
      - logging"

  # ELK Stack - Logstash（可选）
  logstash:
    image: docker.elastic.co/logstash/logstash:8.11.0
    container_name: serpent-logstash
    restart: always
    ports:
      - "5044:5044"
      - "9600:9600"
    volumes:
      - ./config/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    depends_on:
      - elasticsearch
    networks:
      - serpent-network
    profiles:
      - logging"

  # ELK Stack - Kibana（可选）
  kibana:
    image: docker.elastic.co/kibana/kibana:8.11.0
    container_name: serpent-kibana
    restart: always
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - serpent-network
    profiles:
      - logging"

networks:
  serpent-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  chroma-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
  neo4j-plugins:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local
  elasticsearch-data:
    driver: local

secrets:
  neo4j_password:
    file: ./secrets/neo4j_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
  openai_api_key:
    file: ./secrets/openai_api_key.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  secret_key:
    file: ./secrets/secret_key.txt
  encryption_key:
    file: ./secrets/encryption_key.txt
  grafana_admin_user:
    file: ./secrets/grafana_admin_user.txt
  grafana_admin_password:
    file: ./secrets/grafana_admin_password.txt"
