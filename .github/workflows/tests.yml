name: Tests

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test-core:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || pip install pydantic>=2.0 pydantic-settings>=2.0 aiohttp>=3.9 pytest pytest-asyncio fastapi uvicorn jinja2 sqlalchemy aiosqlite loguru cryptography bcrypt httpx python-multipart python-dotenv pyyaml pyotp tiktoken
          pip install pytest pytest-asyncio

      - name: Run core tests
        run: |
          python -m pytest tests/ -q --tb=long \
            --ignore=tests/test_voice.py \
            --ignore=tests/test_workflow.py \
            --ignore=tests/test_security.py \
            --ignore=tests/test_models_extended.py \
            --ignore=tests/test_models_full.py \
            --ignore=tests/test_tools_full.py \
            --ignore=tests/test_voice_full.py \
            --ignore=tests/test_workflow_full.py \
            --ignore=tests/test_routes_full.py \
            --ignore=tests/test_skills_full.py \
            -p no:cacheprovider
        env:
          PYTHONPATH: ${{ github.workspace }}
