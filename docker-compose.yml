# SerpentAI Docker Compose 配置
# 快速启动：docker compose up -d

version: '3.8'

services:
  # SerpentAI 主服务
  serpent-ai:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./backend/logs:/app/backend/logs
      - ./models:/app/models
    environment:
      - DEBUG=false
      - LOG_LEVEL=INFO
      - SQLITE_URL=sqlite:///app/data/serpent_ai.db
      - CHROMA_PERSIST_DIR=/app/data/chroma
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=serpentai2024
    depends_on:
      - chroma
      - neo4j
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ChromaDB 向量数据库
  chroma:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/.chroma
    environment:
      - IS_PERSISTENT=TRUE
      - PERSIST_PATH=/chroma/.chroma
    restart: unless-stopped

  # Neo4j 知识图谱数据库
  neo4j:
    image: neo4j:5.15-community
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    environment:
      - NEO4J_AUTH=neo4j/serpentai2024
      - NEO4J_PLUGINS=[{"name":"apoc"}]
    restart: unless-stopped

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Web UI（可选，用于开发）
  frontend:
    image: nginx:alpine
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - serpent-ai
    profiles:
      - dev

volumes:
  chroma-data:
  neo4j-data:
  redis-data:
