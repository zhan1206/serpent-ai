# ==================== Security Recommendations ====================
# 1. Run Nginx as non-root user (already done: user nginx;)
# 2. Hide Nginx version:
#    server_tokens off;
# 3. Disable unnecessary HTTP methods:
#    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|OPTIONS)$) {
#        return 405;
#    }
# 4. Limit request size (already done: client_max_body_size 50M;)
# 5. Set timeout values:
#    client_body_timeout 12;
#    client_header_timeout 12;
#    send_timeout 10;
# 6. Enable SELinux/AppArmor profiling (if available)
# 7. Use SSL Labs test: https://www.ssllabs.com/ssltest/
# 8. Use security headers checker: https://securityheaders.com/

# ==================== Performance Tuning ====================
# 1. Adjust worker_processes (auto = number of CPU cores)
# 2. Increase worker_connections if needed
# 3. Enable open_file_cache:
#    open_file_cache max=1000 inactive=20s;
#    open_file_cache_valid 30s;
#    open_file_cache_min_uses 2;
#    open_file_cache_errors on;
# 4. Monitor with: nginx -V 2>&1 | grep -o with-.*_module

