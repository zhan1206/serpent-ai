# SerpentAI Nginx Reverse Proxy Configuration
# For production deployment
#
# Usage:
#   docker run -d -p 80:80 -p 443:443 \
#     -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf:ro \
#     -v $(pwd)/ssl:/etc/nginx/ssl:ro \
#     nginx:alpine

# ==================== Main Configuration ====================

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

# Worker connections
events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

# ==================== HTTP Block ====================

http {
    # Basic settings
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Logging format (JSON for log collection)
    log_format json_escape_json_logging on;
        log_format json_logging escape=json
            '{'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"request_id":"$request_id",'
            '"session_id":"$cookie_session_id",'
            '"response_time_ms":$request_time,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"remote_addr":"$remote_addr",'
            '"user_agent":"$http_user_agent"'
            '}';
    
    access_log /var/log/nginx/access.log json_logging;
    error_log /var/log/nginx/error.log warn;
    
    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 50M;  # Max upload size
    client_body_buffer_size 128k;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript 
               application/javascript application/xml+rss application/json 
               application/octet-stream;
    gzip_proxied any;
    gzip_comp_level 6;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=5r/s;
    limit_req_status 429;
    
    # Upstream for SerpentAI backend
    upstream serpent_backend {
        server serpent-ai:8000;
        keepalive 32;
    }
    
    # ==================== HTTP Server (Redirect to HTTPS) ====================
    
    server {
        listen 80;
        server_name yourdomain.com api.yourdomain.com;
        
        # Redirect all HTTP to HTTPS
        return 301 https://$server_name$request_uri;
    }
    
    # ==================== HTTPS Server ====================
    
    server {
        listen 443 ssl http2;
        server_name yourdomain.com api.yourdomain.com;
        
        # SSL configuration
        ssl_certificate /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        
        # SSL security settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;
        
        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
        
        # ==================== Health Check (No Auth Required) ====================
        
        location /health {
            access_log off;  # No logging for health checks
            return 200 '{"status":"healthy","timestamp":"$time_iso8601"}\n';
            add_header Content-Type application/json always;
        }
        
        # ==================== Metrics Endpoint (Prometheus) ====================
        
        location /metrics {
            # Only allow internal monitoring network
            allow 172.20.0.0/16;  # Docker network
            allow 10.0.0.0/8;     # Internal network
            deny all;
            
            proxy_pass http://serpent_backend/metrics;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        
        # ==================== API Documentation ====================
        
        location ~ ^/(api/docs|api/redoc|api/openapi\.json)$ {
            # Allow public access to API docs
            proxy_pass http://serpent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            
            # Cache API docs
            proxy_cache api_docs;
            proxy_cache_valid 200 1h;
        }
        
        # ==================== Chat Endpoint (Rate Limited) ====================
        
        location /api/chat {
            # Apply rate limiting
            limit_req zone=chat_limit burst=20 nodelay;
            
            # Increase timeout for streaming
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            
            # Enable SSE (Server-Sent Events) if using streaming
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            
            proxy_pass http://serpent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        
        # ==================== API Endpoints (Rate Limited) ====================
        
        location /api/ {
            # Apply rate limiting
            limit_req zone=api_limit burst=10 nodelay;
            
            # CORS headers
            add_header 'Access-Control-Allow-Origin' '$http_origin' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
            
            # Handle OPTIONS preflight
            if ($request_method = 'OPTIONS') {
                return 204;
            }
            
            proxy_pass http://serpent_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            
            # Request ID for tracing
            proxy_set_header X-Request-ID $request_id;
        }
        
        # ==================== Static Files (Frontend) ====================
        
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            
            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
            
            # Don't cache HTML files
            location ~* \.html$ {
                expires -1;
                add_header Cache-Control "no-store, no-cache, must-revalidate";
            }
        }
        
        # ==================== WebSocket Support (If Needed) ====================
        
        location /ws {
            proxy_pass http://serpent_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # WebSocket timeout
            proxy_read_timeout 3600s;
        }
        
        # ==================== Error Pages ====================
        
        error_page 429 = /errors/429.html;
        error_page 500 502 503 504 /errors/50x.html;
        
        location /errors {
            internal;
            root /usr/share/nginx/html;
        }
    }
    
    # ==================== Cache Zone ====================
    
    proxy_cache_path /var/cache/nginx levels=1:2 keys_zone=api_docs:10m max_size=100m inactive=60m;
    
    # ==================== Map for Request ID ====================
    
    map $http_x_request_id $request_id {
        default $http_x_request_id;
        ""        $request_id_internal;
    }
    
    # Generate request ID if not provided
    if ($request_id = "") {
        set $request_id_internal $msec-$connection-$connection_requests;
    }
}

# ==================== Stream Block (TCP/UDP Load Balancing) ====================
